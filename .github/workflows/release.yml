name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Determine package version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            "PACKAGE_VERSION=$env:GITHUB_REF_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "PACKAGE_VERSION=manual-$env:GITHUB_RUN_NUMBER" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Package portable zip
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 -Version $env:PACKAGE_VERSION

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-instant-replay-${{ env.PACKAGE_VERSION }}-windows-x64
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
