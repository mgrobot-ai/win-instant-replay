changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - fix
        - bug
    - title: 📦 Packaging and CI
      labels:
        - ci
        - packaging
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
